<style>
  :root{
    --ink:#1f2421; --ink-soft:#5b635d; --line:#e3e6e1; --line-soft:#eef0ec;
    --paper:#fbfcfa; --card:#ffffff; --brand:#2f6f5b; --brand-soft:#e6f0ec;
    --warn-bg:#fbe9c8; --warn-ink:#7a5310; --danger-bg:#f6cccc; --danger-ink:#8a2020;
    --both-bg:#e88a8a; --both-ink:#5c1414;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    font-size:14px;line-height:1.6;}
  a{color:inherit;}
  .layout{display:flex;min-height:100vh;}
  /* sidebar */
  .side{width:208px;flex-shrink:0;background:var(--card);border-right:1px solid var(--line);
    padding:20px 14px;display:flex;flex-direction:column;gap:4px;}
  .brand{font-size:15px;font-weight:700;letter-spacing:-.02em;padding:6px 10px 14px;}
  .brand small{display:block;font-size:11px;font-weight:500;color:var(--ink-soft);letter-spacing:0;}
  .navbtn{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;
    cursor:pointer;color:var(--ink-soft);font-weight:500;border:none;background:none;
    width:100%;text-align:left;font-size:13.5px;}
  .navbtn:hover{background:var(--line-soft);color:var(--ink);}
  .navbtn.active{background:var(--brand-soft);color:var(--brand);font-weight:600;}
  .navbtn .ic{width:17px;text-align:center;}
  .conn{margin-top:auto;font-size:11px;color:var(--ink-soft);padding:8px 10px;
    border-top:1px solid var(--line);}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;
    vertical-align:middle;background:#c0c0c0;}
  .dot.on{background:var(--brand);}
  /* main */
  .main{flex:1;padding:26px 30px;min-width:0;}
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap;}
  h1{font-size:19px;font-weight:700;letter-spacing:-.02em;margin:0;}
  .sub{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .btn{border:1px solid var(--line);background:var(--card);color:var(--ink);
    padding:8px 14px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;}
  .btn:hover{border-color:#c8cdc6;}
  .btn.primary{background:var(--brand);color:#fff;border-color:var(--brand);}
  .btn.primary:hover{background:#275e4d;}
  .btn.sm{padding:5px 9px;font-size:12px;font-weight:500;}
  .btn.ghost{border:none;background:none;color:var(--ink-soft);}
  .btn.ghost:hover{color:var(--brand);}
  /* card + table */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;font-weight:600;color:var(--ink-soft);font-size:11.5px;
    letter-spacing:.02em;padding:10px 14px;border-bottom:1.5px solid var(--line);white-space:nowrap;}
  td{padding:12px 14px;border-bottom:1px solid var(--line-soft);vertical-align:top;line-height:1.5;}
  td b{font-weight:600;color:var(--ink);}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:#fafbf9;}
  td .cmeta{color:var(--ink-soft);font-size:12px;margin-top:2px;line-height:1.45;}
  .tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11.5px;font-weight:600;
    background:var(--brand-soft);color:var(--brand);}
  .muted{color:var(--ink-soft);}
  .row-actions{display:flex;gap:4px;justify-content:flex-end;}
  /* timetable */
  .ttfilter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .ttchip{border:1px solid var(--line);background:var(--card);color:var(--ink-soft);
    padding:6px 12px;border-radius:20px;cursor:pointer;font-size:12.5px;font-weight:500;}
  .ttchip:hover{border-color:#c8cdc6;color:var(--ink);}
  .ttchip.on{background:var(--brand);color:#fff;border-color:var(--brand);font-weight:600;}
  .cal-head{display:grid;grid-template-columns:repeat(7,1fr);background:#f6f8f5;border-bottom:1px solid var(--line);}
  .cal-head>div{padding:8px 0;text-align:center;font-size:12px;font-weight:600;color:var(--ink-soft);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
  .cal-cell{min-height:84px;border-right:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);
    padding:4px;cursor:pointer;overflow:hidden;}
  .cal-cell:nth-child(7n){border-right:none;}
  .cal-cell.empty{background:#fafbf9;cursor:default;}
  .cal-cell:hover:not(.empty){background:#f6f8f5;}
  .cal-cell.today{background:var(--brand-soft);}
  .cal-d{font-size:12.5px;font-weight:600;margin-bottom:3px;}
  .cal-d.sun{color:#c0392b;} .cal-d.sat{color:#3a5fc2;}
  .cal-ev{font-size:10px;color:#fff;border-radius:3px;padding:1px 4px;margin-bottom:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cal-more{font-size:10px;color:var(--ink-soft);padding-left:3px;}
  @media(max-width:680px){.cal-cell{min-height:62px;}.cal-ev{font-size:8.5px;}}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;}
  .legend span{display:inline-flex;align-items:center;gap:6px;}
  .sw{width:14px;height:14px;border-radius:3px;border:1px solid var(--line);}
  .tt-wrap{overflow-x:auto;}
  table.tt{table-layout:fixed;min-width:620px;}
  table.tt th,table.tt td{border:1px solid var(--line);text-align:center;}
  table.tt th{padding:7px 4px;background:#f6f8f5;}
  table.tt td{height:40px;padding:2px;font-size:11px;}
  .tcol{width:46px;}
  .cls{border-radius:5px;padding:3px 5px;margin:1px 0;line-height:1.25;cursor:pointer;text-align:left;}
  .cls b{font-weight:700;}
  .cls.ok{background:var(--card);border:1px solid var(--line);}
  .cls.warn{background:var(--warn-bg);color:var(--warn-ink);}
  .cls.room{background:var(--danger-bg);color:var(--danger-ink);}
  .cls.both{background:var(--both-bg);color:var(--both-ink);}

  .tab.active{color:var(--brand);border-bottom-color:var(--brand);}

  .overlay.show{display:flex;}
  .modal{background:var(--card);border-radius:14px;width:100%;max-width:480px;

  .modal h3{margin:0 0 16px;font-size:16px;}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:5px;}
  .field input,.field select{width:100%;padding:8px 10px;border:1px solid var(--line);

    .layout{flex-direction:column;}

    .side.open{transform:translateX(0);}

    .conn{display:block;}

    #backupBtn{margin-top:8px;}
    .main{padding:68px 14px 24px;}
    h1{font-size:17px;}
    .head{margin-bottom:14px;}
    .modal{max-width:100%;padding:18px 16px;border-radius:14px 14px 0 0;align-self:flex-end;}
    .overlay{align-items:flex-end;padding:0;}
    .grid2{grid-template-columns:1fr;}
    th,td{padding:9px 8px;font-size:12.5px;}

// ── 충돌 판정 ──
function conflicts(){
  let flat=[];
  DB.courses.forEach(c=>(c.sessions||[]).forEach(s=>flat.push({...s,course:c})));
  flat.forEach(f=>{f.room=false;f.grade=false;});
  const m=t=>{let[a,b]=t.split(':');return +a*60+ +b;};
  for(let i=0;i<flat.length;i++)for(let j=i+1;j<flat.length;j++){
    const a=flat[i],b=flat[j];
    if(a.weekday!==b.weekday) continue;
    if(!(m(a.start_time)<m(b.end_time)&&m(b.start_time)<m(a.end_time))) continue;
    if(a.room_id===b.room_id){a.room=true;b.room=true;}
    const ta=DB.target_groups.find(t=>t.id===a.course.target_id)||{};
    const tb=DB.target_groups.find(t=>t.id===b.course.target_id)||{};
    if(ta.grade_from<=tb.grade_to&&tb.grade_from<=ta.grade_to){a.grade=true;b.grade=true;}
  }
  return flat;
}

  return `<div class="head"><div><h1>${title}</h1><div class="sub">${sub}</div></div>${btn||''}</div>`;
}
function connBanner(){
  return LIVE?'':`<div class="banner">⚠ 지금은 <b>샘플 데이터</b>로 미리보기 중입니다. 파일 상단의 <b>SUPABASE_URL / SUPABASE_KEY</b>를 본인 것으로 바꾸면 실제 데이터에 연결됩니다.</div>`;

// 현재 진행 중인 세션인지 판정 (요일+시각 대조)
function nowTeaching(c){
  const now=new Date();
  const wd=now.getDay()===0?7:now.getDay(); // JS:일=0 → 우리체계 일=7
  const cur=now.getHours()*60+now.getMinutes();
  const m=t=>{let[h,mn]=(t||'0:0').split(':');return +h*60+ +mn;};
  for(const s of (c.sessions||[])){
    if(s.weekday===wd && m(s.start_time)<=cur && cur<m(s.end_time)) return s;
  }
  return null;
}
// ═══ 관리자 대시보드 (첫 화면 요약) ═══
function renderDashboard(){
  const teacher=isTeacher();
  const myInst=teacher?currentAdmin.instructor_id:null;
  const today=new Date(); const wd=today.getDay()===0?7:today.getDay();
  const WDN=['','월','화','수','목','금','토','일'];

  // 강사면 본인 담당 강좌만
  const myCourses=teacher
    ? DB.courses.filter(c=>c.instructor_id===myInst)
    : DB.courses;
  const myCourseIds=new Set(myCourses.map(c=>c.id));

    ? DB.enrollments.filter(e=>myCourseIds.has(e.course_id))
    : DB.enrollments;

  // 오늘 수업 (본인 강좌 중 오늘 요일)
  const todayCourses=myCourses.filter(c=>(c.sessions||[]).some(s=>s.weekday===wd));

  if(teacher){
    // ── 강사 전용 대시보드 ──
    const myStudents=new Set(scopedEnr.map(e=>e.student_id)).size;
    const stat=(label,val,color)=>`<div class="card" style="padding:16px 18px;flex:1;min-width:130px;">

    const todayList=todayCourses.length
      ? todayCourses.map(c=>{
          const ses=(c.sessions||[]).filter(s=>s.weekday===wd).map(s=>`${hhmm(s.start_time)}~${hhmm(s.end_time)} · ${name('rooms',s.room_id)}`).join('<br>');
          const cnt=DB.enrollments.filter(e=>e.course_id===c.id&&e.status==='ENROLLED').length;
          return `<tr><td><b>${c.title}</b></td><td class="muted">${ses}</td><td style="text-align:right;">${cnt}명</td></tr>`;
        }).join('')
      : '<tr><td colspan="3" class="empty">오늘 예정된 수업이 없습니다.</td></tr>';
    // 내 강좌별 등록 인원
    const courseList=myCourses.map(c=>{
      const cnt=DB.enrollments.filter(e=>e.course_id===c.id&&e.status==='ENROLLED').length;
      const when=(c.sessions||[]).map(s=>`${WDN[s.weekday]} ${hhmm(s.start_time)}~${hhmm(s.end_time)}`).join(', ');
      return `<tr><td><b>${c.title}</b></td><td class="muted" style="font-size:12px;">${when}</td><td style="text-align:right;">${cnt}명</td></tr>`;
    }).join('')||'<tr><td colspan="3" class="empty">담당 강좌가 없습니다.</td></tr>';

    main.innerHTML=head('내 대시보드',`${today.getMonth()+1}월 ${today.getDate()}일 (${WDN[wd]}) · ${currentAdmin.name} 강사님`)+connBanner()+`
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;">
        ${stat('내 강좌',myCourses.length+'개','var(--brand)')}
        ${stat('오늘 수업',todayCourses.length+'개','var(--ink)')}
        ${stat('내 학생',myStudents+'명','#5a6b8a')}
      </div>
      <h1 style="font-size:15px;margin:0 0 10px;">📅 오늘의 수업 (${todayCourses.length})</h1>
      <div class="card" style="margin-bottom:22px;"><table><thead><tr><th>강좌</th><th>시간·장소</th><th style="text-align:right;">등록</th></tr></thead>
      <tbody>${todayList}</tbody></table></div>
      <h1 style="font-size:15px;margin:0 0 10px;">📚 내 담당 강좌</h1>
      <div class="card"><table><thead><tr><th>강좌</th><th>요일·시간</th><th style="text-align:right;">등록</th></tr></thead>
      <tbody>${courseList}</tbody></table></div>
      <p class="muted" style="font-size:12px;margin-top:12px;">주간 시간표 메뉴에서 본인 수업 시간표를 크게 볼 수 있어요.</p>`;
    return;
  }

  // ── 관리자 대시보드 ──
  const unpaidStu=new Set(DB.enrollments.filter(e=>e.payment_status==='UNPAID'||!e.payment_status).map(e=>e.student_id)).size;
  const pending=DB.enrollments.filter(e=>e.confirmed!==true).length;
  const waiting=DB.enrollments.filter(e=>e.status==='WAITLIST').length;
  const openState=getSetting('enroll_open')!=='false';

  const stat=(label,val,color,vw)=>`<div class="card" style="padding:16px 18px;flex:1;min-width:130px;cursor:${vw?'pointer':'default'};" ${vw?`onclick="setView('${vw}')"`:''}>
    <div class="muted" style="font-size:12px;">${label}</div>
    <div style="font-size:26px;font-weight:700;color:${color};margin-top:2px;font-variant-numeric:tabular-nums;">${val}</div></div>`;

  const todayList=todayCourses.length
    ? todayCourses.map(c=>{
        const ses=(c.sessions||[]).filter(s=>s.weekday===wd).map(s=>`${hhmm(s.start_time)}~${hhmm(s.end_time)}`).join(', ');
        const cnt=DB.enrollments.filter(e=>e.course_id===c.id&&e.status==='ENROLLED').length;
        return `<tr><td><b>${c.title}</b></td><td class="muted">${name('instructors',c.instructor_id)}</td><td class="muted">${ses}</td><td style="text-align:right;">${cnt}명</td></tr>`;
      }).join('')
    : '<tr><td colspan="4" class="empty">오늘 예정된 수업이 없습니다.</td></tr>';

  main.innerHTML=head('대시보드',`${today.getMonth()+1}월 ${today.getDate()}일 (${WDN[wd]}) · 안녕하세요, ${currentAdmin?currentAdmin.name:''}님`)+connBanner()+`
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;">
      ${stat('전체 학생',DB.students.length+'명','var(--brand)','students')}
      ${stat('전체 강좌',DB.courses.length+'개','var(--ink)','courses')}
      ${stat('미납 학생',unpaidStu+'명','#a32d2d','enrollments')}
      ${stat('미확정 신청',pending+'건','#7a6a3a','enrollments')}
      ${stat('대기 인원',waiting+'명','#5a6b8a',null)}
    </div>
    <div class="card" style="padding:14px 16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
      <div>
        <div style="font-weight:600;">수강신청 접수 상태</div>
        <div class="muted" style="font-size:12.5px;">학생 페이지에서 신청을 받을지 여부입니다.</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-weight:700;color:${openState?'#1f6b54':'#a32d2d'};">${openState?'🟢 접수 중':'🔴 마감'}</span>

    </div>
    <h1 style="font-size:15px;margin:0 0 10px;">📅 오늘의 수업 (${todayCourses.length})</h1>
    <div class="card"><table><thead><tr><th>강좌</th><th>강사</th><th>시간</th><th style="text-align:right;">등록</th></tr></thead>
    <tbody>${todayList}</tbody></table></div>`;

// 앱 설정 읽기/쓰기
function getSetting(key){
  const row=(DB.app_settings||[]).find(s=>s.key===key);
  return row?row.value:null;
}
async function toggleEnrollOpen(){
  const cur=getSetting('enroll_open')!=='false';
  const next=cur?'false':'true';
  if(!confirm(cur?'수강신청을 마감할까요? (학생이 신청할 수 없게 됩니다)':'수강신청을 다시 열까요?'))return;
  if(LIVE){
    // upsert
    const{error}=await sb.from('app_settings').upsert({key:'enroll_open',value:next},{onConflict:'key'});
    if(error){alert('오류: '+error.message);return;}
    await loadAll();
  } else {
    let row=(DB.app_settings=DB.app_settings||[]).find(s=>s.key==='enroll_open');
    if(row)row.value=next; else DB.app_settings.push({key:'enroll_open',value:next});
  }
  renderDashboard();
}

// ═══ 공지사항 관리 ═══
function renderNotices(){
  const list=(DB.notices||[]).slice().sort((a,b)=>{
    if(a.pinned!==b.pinned)return a.pinned?-1:1;
    return new Date(b.created_at)-new Date(a.created_at);
  });
  const rows=list.map(n=>`<div class="card" style="padding:14px 16px;margin-bottom:10px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
      <div style="flex:1;">
        <div style="font-weight:600;font-size:14.5px;">${n.pinned?'📌 ':''}${escapeHtml(n.title)}</div>
        ${n.body?`<div class="muted" style="font-size:13px;margin-top:5px;white-space:pre-wrap;line-height:1.5;">${escapeHtml(n.body)}</div>`:''}
        <div class="muted" style="font-size:11px;margin-top:6px;">${(n.created_at||'').slice(0,10)}</div>
      </div>
      <div class="row-actions">
        <button class="btn sm" onclick="togglePin(${n.id},${!n.pinned})">${n.pinned?'고정해제':'상단고정'}</button>
        <button class="btn sm ghost" onclick="delNotice(${n.id})">삭제</button>
      </div>
    </div></div>`).join('')||'<div class="card"><div class="empty" style="padding:24px;">등록된 공지가 없습니다.</div></div>';

  main.innerHTML=head('공지사항','학생 로그인 화면과 대시보드에 표시됩니다.',
    `<button class="btn primary" onclick="noticeForm()">+ 공지 작성</button>`)+connBanner()+rows;
}
function noticeForm(){
  openModal('공지 작성',`
    <div class="field"><label>제목</label><input id="n_title" placeholder="예: 여름학기 신청 안내"></div>
    <div class="field"><label>내용</label><textarea id="n_body" rows="5" style="width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:13.5px;" placeholder="공지 내용을 입력하세요"></textarea></div>
    <div class="field"><label><input id="n_pin" type="checkbox" style="width:auto;margin-right:6px;">상단에 고정</label></div>`,
    async()=>{
      if(!val('n_title')){alert('제목을 입력해 주세요.');return;}
      const obj={title:val('n_title'),body:(document.getElementById('n_body')||{}).value||null,pinned:document.getElementById('n_pin').checked};
      if(LIVE){const{error}=await sb.from('notices').insert(obj);if(error){alert('저장 오류: '+error.message);return;}await loadAll();}
      else{(DB.notices=DB.notices||[]).push({id:Date.now(),...obj,created_at:new Date().toISOString()});}
      closeModal();renderNotices();
    });
}
async function togglePin(id,pin){
  if(LIVE){await sb.from('notices').update({pinned:pin}).eq('id',id);await loadAll();}
  else{const n=DB.notices.find(x=>x.id===id);if(n)n.pinned=pin;}
  renderNotices();
}
async function delNotice(id){
  if(!confirm('이 공지를 삭제할까요?'))return;
  if(LIVE){await sb.from('notices').delete().eq('id',id);await loadAll();}
  else{DB.notices=DB.notices.filter(x=>x.id!==id);}
  renderNotices();
}
function escapeHtml(s){return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}

function renderSearch(){
  main.innerHTML=head('통합검색','학생·강사·강좌 이름으로 검색하세요. 강사는 지금 수업 중인지도 표시됩니다.')+`
    <div class="card" style="padding:14px;margin-bottom:18px;">
      <input id="searchInput" placeholder="이름을 입력하세요 (학생/강사/강좌)" autocomplete="off"
        style="width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:9px;font-size:14.5px;"
        oninput="searchDebounced(this.value)">
    </div>
    <div id="searchResults"><div class="empty" style="color:var(--ink-soft);">검색어를 입력하면 결과가 나타납니다.</div></div>`;
  setTimeout(()=>{const el=document.getElementById('searchInput');if(el)el.focus();},50);
}
let _searchTimer=null;
function searchDebounced(q){
  clearTimeout(_searchTimer);
  _searchTimer=setTimeout(()=>doSearch(q),220);
}
function doSearch(q){
  q=(q||'').trim();
  const box=document.getElementById('searchResults');
  if(!box)return;
  if(q.length<1){box.innerHTML='<div class="empty" style="color:var(--ink-soft);">검색어를 입력하면 결과가 나타납니다.</div>';return;}
  const ql=q.toLowerCase();
  let html='';

  // ── 강사 검색 ──
  const insts=DB.instructors.filter(i=>(i.name||'').toLowerCase().includes(ql));
  if(insts.length){
    html+='<div style="font-weight:700;font-size:13px;margin:6px 0 8px;color:var(--ink-soft);">강사</div>';
    insts.forEach(i=>{
      const myCourses=DB.courses.filter(c=>c.instructor_id===i.id);
      const teachingNow=myCourses.map(c=>({c,s:nowTeaching(c)})).find(x=>x.s);
      const status=teachingNow
        ? `<span style="background:#dcefe7;color:#1f6b54;padding:2px 9px;border-radius:20px;font-size:11.5px;font-weight:600;">● 수업 중 · ${name('subjects',teachingNow.c.subject_id)} (${name('rooms',teachingNow.s.room_id)})</span>`
        : `<span style="background:var(--line-soft);color:var(--ink-soft);padding:2px 9px;border-radius:20px;font-size:11.5px;">수업 없음</span>`;
      const courseList=myCourses.map(c=>{
        const when=(c.sessions||[]).map(s=>`${WD[s.weekday]} ${hhmm(s.start_time)}~${hhmm(s.end_time)}`).join(', ');
        return `<div class="cmeta" style="font-size:12.5px;">· ${c.title} <span class="muted">(${when||'시간 미정'})</span></div>`;
      }).join('')||'<div class="muted" style="font-size:12.5px;">담당 강좌 없음</div>';
      html+=`<div class="card" style="padding:13px;margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <b style="font-size:15px;">${i.name}</b>${status}</div>
        ${courseList}</div>`;
    });
  }

  // ── 학생 검색 ──
  const studs=DB.students.filter(s=>(s.name||'').toLowerCase().includes(ql));
  if(studs.length){
    html+='<div style="font-weight:700;font-size:13px;margin:14px 0 8px;color:var(--ink-soft);">학생</div>';
    studs.forEach(s=>{
      const myEnr=DB.enrollments.filter(e=>e.student_id===s.id);
      const courseList=myEnr.map(e=>{
        const c=DB.courses.find(x=>x.id===e.course_id); if(!c)return'';
        const when=(c.sessions||[]).map(x=>`${WD[x.weekday]} ${hhmm(x.start_time)}~${hhmm(x.end_time)}`).join(', ');
        const st=e.status==='WAITLIST'?' <span style="color:var(--full-ink);">[대기]</span>':'';
        const pay=e.payment_status==='PAID'?'완납':e.payment_status==='REFUNDED'?'환불':'미납';
        return `<div class="cmeta" style="font-size:12.5px;">· <b>${c.title}</b> — ${name('instructors',c.instructor_id)} 강사 · ${when}${st} <span class="muted">· ${pay}</span></div>`;
      }).filter(Boolean).join('')||'<div class="muted" style="font-size:12.5px;">신청한 강좌 없음</div>';
      html+=`<div class="card" style="padding:13px;margin-bottom:10px;">
        <div style="margin-bottom:6px;"><b style="font-size:15px;">${s.name}</b>
          <span class="muted" style="font-size:12.5px;margin-left:6px;">${s.grade!=null?gradeText(s.grade):''} ${s.parent_phone?'· '+s.parent_phone:''}</span></div>
        ${courseList}</div>`;
    });
  }

  // ── 강좌 검색 ──
  const crs=DB.courses.filter(c=>(c.title||'').toLowerCase().includes(ql));
  if(crs.length){
    html+='<div style="font-weight:700;font-size:13px;margin:14px 0 8px;color:var(--ink-soft);">강좌</div>';
    crs.forEach(c=>{
      const enrolled=DB.enrollments.filter(e=>e.course_id===c.id&&e.status==='ENROLLED').length;
      const when=(c.sessions||[]).map(s=>`${WD[s.weekday]} ${hhmm(s.start_time)}~${hhmm(s.end_time)}`).join(', ');
      const live=nowTeaching(c)?' <span style="background:#dcefe7;color:#1f6b54;padding:1px 7px;border-radius:20px;font-size:11px;font-weight:600;">진행 중</span>':'';
      html+=`<div class="card" style="padding:13px;margin-bottom:10px;">
        <div style="margin-bottom:4px;"><b style="font-size:15px;">${c.title}</b>${live}</div>
        <div class="cmeta" style="font-size:12.5px;">${name('subjects',c.subject_id)} · ${name('instructors',c.instructor_id)} 강사 · ${when}</div>
        <div class="cmeta" style="font-size:12.5px;">등록 ${enrolled}명${c.capacity?(' / 정원 '+c.capacity):''}</div></div>`;
    });
  }

  box.innerHTML=html||'<div class="empty" style="color:var(--ink-soft);">검색 결과가 없습니다.</div>';
}
function gradeText(g){return g===0?'7세':g<=6?('초'+g):g<=9?('중'+(g-6)):g<=12?('고'+(g-9)):'성인';}

function renderTimetable(){
  const flat=conflicts().filter(f=> ttFilter==null ? true : f.course.instructor_id===ttFilter);
  let rows='';
  for(let h=9;h<=22;h++){
    rows+=`<tr><td class="tcol muted">${String(h).padStart(2,'0')}:00</td>`;
    for(let wd=1;wd<=7;wd++){
      const cells=flat.filter(f=>f.weekday===wd&&(+f.start_time.split(':')[0])===h);
      rows+='<td>'+cells.map(f=>{
        const cls=f.room&&f.grade?'both':f.room?'room':f.grade?'warn':'ok';
        return `<div class="cls ${cls}" onclick="explain(${f.course.id})">
          <b>${name('subjects',f.course.subject_id)}</b><br>${name('instructors',f.course.instructor_id)}<br>
          ${hhmm(f.start_time)}~${hhmm(f.end_time)}<br>${name('rooms',f.room_id)}</div>`;
      }).join('')+'</td>';
    }
    rows+='</tr>';
  }
  // 강사 필터 버튼들 — 강좌가 있는 강사만 표시 (자동 반영)
  const activeInstIds=[...new Set(DB.courses.map(c=>c.instructor_id).filter(x=>x!=null))];
  const activeInsts=DB.instructors.filter(i=>activeInstIds.includes(i.id));
  const chips=`<button class="ttchip ${ttFilter==null?'on':''}" onclick="ttFilter=null;renderTimetable()">전체</button>`+
    activeInsts.map(i=>`<button class="ttchip ${ttFilter===i.id?'on':''}" onclick="ttFilter=${i.id};renderTimetable()">${i.name}</button>`).join('');
  const who = ttFilter==null ? '전체 강사' : ((DB.instructors.find(i=>i.id===ttFilter)||{}).name||'')+' 강사';
  main.innerHTML=head('주간 시간표','강좌 칸을 누르면 충돌 상세를 볼 수 있어요. · 현재 보기: '+who,

// 입력한 이름으로 기존 id를 찾고, 없으면 마스터에 새로 만들어 id 반환
// 라벨에서 학년 코드 하나를 인식 (7세=0, 초1~6=1~6, 중1~3=7~9, 고1~3=10~12, 성인=13)
function parseGradeToken(tok){
  tok=tok.trim();
  if(/7\s*세|일곱\s*살/.test(tok)) return 0;
  if(/성인|어른/.test(tok)) return 13;
  let m=tok.match(/초\D*(\d)/); if(m) return Math.min(6,+m[1]);
  m=tok.match(/중\D*(\d)/); if(m) return 6+Math.min(3,+m[1]);
  m=tok.match(/고\D*(\d)/); if(m) return 9+Math.min(3,+m[1]);
  // 학교급만 있는 경우
  if(/초등|초\b/.test(tok)) return null; // 범위는 아래에서 처리
  return null;
}
// 라벨 전체에서 grade_from/grade_to 추론. 실패하면 null 반환(=물어봐야 함)
function parseGradeRange(label){
  label=label.trim();
  // "초등 전체/초등부" 같은 학교급 전체
  if(/^초등(\s*(전체|부))?$/.test(label)) return {from:1,to:6};
  if(/^중등(\s*(전체|부))?$/.test(label)) return {from:7,to:9};
  if(/^고등(\s*(전체|부))?$/.test(label)) return {from:10,to:12};
  if(/^7\s*세$/.test(label)) return {from:0,to:0};
  if(/^성인$/.test(label)) return {from:13,to:13};
  // "초1-초5", "고1-고3", "중2-고2", "초1-5" 같은 범위형
  const parts=label.split(/[-~－]/).map(s=>s.trim()).filter(Boolean);
  if(parts.length===2){
    let a=parseGradeToken(parts[0]);
    // "초1-5"처럼 뒤쪽에 학교급이 생략된 경우, 앞 학교급을 붙여 해석
    let b=parseGradeToken(parts[1]);
    if(b===null){ // 숫자만 있는 경우: 앞 토큰의 학교급 접두어 재사용
      const prefix=(parts[0].match(/^(초|중|고)/)||[])[1]||'';
      b=parseGradeToken(prefix+parts[1]);
    }
    if(a!==null && b!==null) return {from:Math.min(a,b),to:Math.max(a,b)};
  } else if(parts.length===1){
    const g=parseGradeToken(parts[0]);
    if(g!==null) return {from:g,to:g};
  }
  return null; // 인식 실패
}

async function resolveId(arr,inputId){
  const raw=val(inputId).trim();
  if(!raw) return null;
  const found=DB[arr].find(x=>(x.name||x.label||'').trim()===raw);
  if(found) return found.id;
  let obj;
  if(arr==='target_groups'){
    let range=parseGradeRange(raw);
    if(!range){
      // 자동 인식 실패 → 학년 범위를 직접 물어봄 (잘못 저장 방지)
      const gf=prompt(`'${raw}' 대상의 시작 학년을 숫자로 입력하세요.\n(7세=0, 초1~6=1~6, 중1~3=7~9, 고1~3=10~12, 성인=13)`);
      if(gf===null) return null;
      const gt=prompt('끝 학년을 숫자로 입력하세요. (하나면 시작과 같게)');
      if(gt===null) return null;
      range={from:+gf, to:+gt};
    }
    obj={label:raw, grade_from:range.from, grade_to:range.to, gender:'공용'};
  } else {
    obj={name:raw};
  }
  if(LIVE){
    const res=await sb.from(arr).insert(obj).select();
    if(res.error){alert('새 '+arr+' 추가 오류: '+res.error.message);return null;}
    const row=res.data[0]; DB[arr].push(row); return row.id;
  } else {
    const nid=Math.max(0,...DB[arr].map(x=>x.id))+1;
    DB[arr].push({id:nid,...obj}); return nid;
  }
}

// 이름으로 마스터 항목을 찾거나 새로 만들어 id 반환 (장소 등)
async function resolveIdByName(arr,raw){
  raw=raw.trim(); if(!raw) return null;
  const found=DB[arr].find(x=>(x.name||x.label||'').trim()===raw);
  if(found) return found.id;
  let obj = arr==='target_groups'?{label:raw,grade_from:0,grade_to:6,gender:'공용'}:{name:raw};
  if(LIVE){
    const res=await sb.from(arr).insert(obj).select();
    if(res.error){alert('새 '+arr+' 추가 오류: '+res.error.message);return null;}
    DB[arr].push(res.data[0]); return res.data[0].id;
  } else {
    const nid=Math.max(0,...DB[arr].map(x=>x.id))+1;
    DB[arr].push({id:nid,...obj}); return nid;
  }
}

// ═══ 수강신청 관리: 검색 → 그 학생의 신청 강좌 + 납부 처리 ═══
function renderEnrollments(){
  const q=(enrQuery||'').trim();

  // 검색어가 있으면 해당 학생들의 상세 카드, 없으면 미납 요약
  let content;
  if(q){
    const matched=DB.students.filter(s=>(s.name||'').includes(q));
    if(!matched.length){
      content=`<div class="card"><div class="empty" style="padding:30px;">'${q}' 학생을 찾을 수 없습니다.</div></div>`;
    } else {
      content=matched.map(s=>enrollCard(s)).join('');
    }
  } else {
    // 미납 있는 학생 요약
    const unpaidEnr=DB.enrollments.filter(e=>e.payment_status==='UNPAID'||!e.payment_status);
    const byStu={};
    unpaidEnr.forEach(e=>{
      const c=DB.courses.find(x=>x.id===e.course_id); if(!c)return;
      (byStu[e.student_id]=byStu[e.student_id]||{amount:0,count:0}).amount+=(c.tuition||0);
      byStu[e.student_id].count++;
    });
    const payRows=Object.keys(byStu).map(sid=>{

// 한 학생의 신청·납부 카드 (수강신청 관리용)
function enrollCard(s){
  const enr=DB.enrollments.filter(e=>e.student_id===s.id);
  let total=0,unpaidTotal=0,unpaidCnt=0;
  const PAY={PAID:['완납','#1f6b54'],UNPAID:['미납','#a32d2d'],REFUNDED:['환불','#7a6a3a']};
  const list=enr.map(e=>{
    const c=DB.courses.find(x=>x.id===e.course_id); if(!c)return'';
    const tui=c.tuition||0; total+=tui;
    const ps=e.payment_status||'UNPAID';
    if(ps==='UNPAID'){unpaidTotal+=tui;unpaidCnt++;}
    const when=(c.sessions||[]).map(x=>`${WD[x.weekday]} ${hhmm(x.start_time)}~${hhmm(x.end_time)}`).join(', ');
    const pay=PAY[ps];
    const wait=e.status==='WAITLIST'?' <span class="tag full" style="font-size:10px;">대기</span>':'';
    const payBtn=ps==='UNPAID'
      ? `<button class="btn sm" onclick="payOneEnr(${e.id})">완납</button>`
      : (ps==='PAID'?`<button class="btn sm ghost" onclick="setPayEnr(${e.id},'UNPAID')">미납전환</button>`:'');
    return `<tr>
      <td><b>${c.title}</b>${wait}<div class="cmeta" style="font-size:11.5px;">${name('subjects',c.subject_id)} · ${name('instructors',c.instructor_id)} · ${when||'-'}</div></td>
      <td style="text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;">${tui?tui.toLocaleString()+'원':'-'}</td>
      <td style="white-space:nowrap;"><span style="font-weight:600;color:${pay[1]};">${pay[0]}</span></td>
      <td onclick="event.stopPropagation()"><div class="row-actions">${payBtn}</div></td>
    </tr>`;
  }).filter(Boolean).join('')||'<tr><td colspan="4" class="empty">신청한 강좌가 없습니다.</td></tr>';

  const bulk=unpaidCnt>0
    ? `<button class="btn primary btn sm" onclick="payAllForStudent(${s.id})">미납 ${unpaidCnt}건 전체 완납 (${unpaidTotal.toLocaleString()}원)</button>`
    : '<span style="color:#1f6b54;font-weight:600;font-size:13px;">완납 완료 👍</span>';

  return `<div class="card" style="margin-bottom:18px;">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 4px 12px;border-bottom:1px solid var(--line);margin-bottom:8px;">
      <div><b style="font-size:16px;">${s.name}</b> <span class="muted">${s.grade!=null?gradeText(s.grade):''} · ${s.parent_phone||'연락처 없음'}</span></div>
      <div style="text-align:right;">
        <div class="muted" style="font-size:11px;">총 수강료</div>
        <div style="font-size:16px;font-weight:700;color:var(--brand);font-variant-numeric:tabular-nums;">${total.toLocaleString()}원</div>
      </div>
    </div>
    <table><thead><tr><th>강좌</th><th style="text-align:right;">수강료</th><th>납부</th><th></th></tr></thead>
    <tbody>${list}</tbody></table>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--line);">
      <span class="muted" style="font-size:12.5px;">${unpaidCnt>0?`미납 ${unpaidCnt}건 · ${unpaidTotal.toLocaleString()}원`:'미납 없음'}</span>
      ${bulk}
    </div></div>`;
}

// 수강신청 관리: 강좌 하나 완납/전환
async function payOneEnr(enrollId){ await setPayEnr(enrollId,'PAID'); }
async function setPayEnr(enrollId,status){
  if(LIVE){
    const{error}=await sb.from('enrollments').update({payment_status:status}).eq('id',enrollId);
    if(error){alert('오류: '+error.message);return;}
    await loadAll();
  } else {
    const e=DB.enrollments.find(x=>x.id===enrollId); if(e)e.payment_status=status;
  }
  renderEnrollments();
}
// 한 학생의 미납 강좌 전체를 완납 처리
async function payAllForStudent(sid){
  const st=DB.students.find(x=>x.id===sid); if(!st)return;
  const unpaid=DB.enrollments.filter(e=>e.student_id===sid&&(e.payment_status==='UNPAID'||!e.payment_status));
  if(!unpaid.length){alert('미납 강좌가 없습니다.');return;}
  const total=unpaid.reduce((s,e)=>{const c=DB.courses.find(x=>x.id===e.course_id);return s+((c&&c.tuition)||0);},0);
  if(!confirm(`'${st.name}' 학생의 미납 ${unpaid.length}개 강좌를 모두 완납 처리할까요?\n합계: ${total.toLocaleString()}원`))return;
  if(LIVE){
    for(const e of unpaid){ await sb.from('enrollments').update({payment_status:'PAID'}).eq('id',e.id); }
    await loadAll();
  } else {
    unpaid.forEach(e=>e.payment_status='PAID');
  }
  renderEnrollments();
}

// 신청 확정/해제 (확정되면 학생이 취소 불가)
async function setConfirm(enrollId,confirmed){

// ── 기초자료 ──
let masterTab='subjects';
// ════════ 계정관리 (관리자 전용) ════════
// ════════ 학사 캘린더 ════════
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth(); // 0-based
let calSchoolFilter=null; // null=전체
const EVENT_TYPE={EXAM:'시험기간',VACATION:'방학',SEMESTER_START:'개학',EVENT:'기타'};
const EVENT_COLOR={EXAM:'#c0392b',VACATION:'#2f8f6f',SEMESTER_START:'#3a5fc2',EVENT:'#7a6a3a'};

function eventsOn(dateStr){
  return (DB.school_events||[]).filter(e=>{
    if(calSchoolFilter!=null && e.school_id!==calSchoolFilter) return false;
    const s=e.start_date, en=e.end_date||e.start_date;
    return dateStr>=s && dateStr<=en;
  });
}
function renderCalendar(){
  const first=new Date(calYear,calMonth,1);
  const startDow=first.getDay(); // 0=일
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date(); const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  let cells='';
  for(let i=0;i<startDow;i++) cells+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const evs=eventsOn(ds);
    const dow=(startDow+d-1)%7;
    const isToday=ds===todayStr;
    const bars=evs.slice(0,3).map(e=>{
      const sc=DB.schools.find(s=>s.id===e.school_id);
      return `<div class="cal-ev" style="background:${EVENT_COLOR[e.type]||'#777'};" title="${(sc?sc.name+' · ':'')}${e.title}">${e.title}</div>`;
    }).join('');
    const more=evs.length>3?`<div class="cal-more">+${evs.length-3}</div>`:'';
    cells+=`<div class="cal-cell ${isToday?'today':''}" onclick="dayDetail('${ds}')">
      <div class="cal-d ${dow===0?'sun':''} ${dow===6?'sat':''}">${d}</div>${bars}${more}</div>`;
  }

  const schoolChips=`<button class="ttchip ${calSchoolFilter==null?'on':''}" onclick="calSchoolFilter=null;renderCalendar()">전체 학교</button>`+
    (DB.schools||[]).map(s=>`<button class="ttchip ${calSchoolFilter===s.id?'on':''}" onclick="calSchoolFilter=${s.id};renderCalendar()">${s.name}</button>`).join('');

  main.innerHTML=head('학사 캘린더','학교별 시험·방학·개학 일정을 관리합니다. 날짜를 누르면 상세/추가할 수 있어요.',
    isAdmin()?`<button class="btn primary" onclick="eventForm()">+ 일정 추가</button>`:'')+`
    <div class="ttfilter">${schoolChips}</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px;">
      <button class="btn sm" onclick="calMove(-1)">‹ 이전</button>
      <div style="font-weight:700;font-size:16px;min-width:130px;text-align:center;">${calYear}년 ${calMonth+1}월</div>
      <button class="btn sm" onclick="calMove(1)">다음 ›</button>
    </div>
    <div class="legend" style="justify-content:center;">
      ${Object.keys(EVENT_TYPE).map(k=>`<span><i class="sw" style="background:${EVENT_COLOR[k]}"></i>${EVENT_TYPE[k]}</span>`).join('')}
    </div>
    <div class="card" style="padding:0;overflow:hidden;">
      <div class="cal-head">${['일','월','화','수','목','금','토'].map((w,i)=>`<div class="${i===0?'sun':i===6?'sat':''}">${w}</div>`).join('')}</div>
      <div class="cal-grid">${cells}</div>
    </div>`;
}
function calMove(n){ calMonth+=n; if(calMonth<0){calMonth=11;calYear--;} if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }
function dayDetail(ds){
  const evs=eventsOn(ds);
  let body=evs.length?evs.map(e=>{
    const sc=DB.schools.find(s=>s.id===e.school_id);
    const range=e.end_date&&e.end_date!==e.start_date?`${e.start_date} ~ ${e.end_date}`:e.start_date;
    return `<div style="padding:9px 0;border-bottom:1px solid var(--line-soft);">
      <div><span class="tag" style="background:${(EVENT_COLOR[e.type]||'#777')}22;color:${EVENT_COLOR[e.type]||'#777'};">${EVENT_TYPE[e.type]||e.type}</span> <b>${e.title}</b></div>
      <div class="muted" style="font-size:12px;">${sc?sc.name+' · ':''}${range}</div>
      ${isAdmin()?`<button class="btn sm ghost" style="margin-top:4px;" onclick="delEvent(${e.id})">삭제</button>`:''}
    </div>`;
  }).join(''):'<div class="muted" style="padding:10px 0;">이 날짜에 등록된 일정이 없습니다.</div>';
  openModal(`${ds} 일정`,body+(isAdmin()?`<button class="btn primary" style="width:100%;margin-top:10px;" onclick="closeModal();eventForm(null,'${ds}')">+ 이 날짜에 일정 추가</button>`:''),null);
  // openModal은 저장버튼 구조라, 여기선 저장버튼 숨김 처리
  const sb2=document.getElementById('saveBtn'); if(sb2)sb2.style.display='none';
}
function eventForm(id,presetDate){
  const e=id?(DB.school_events.find(x=>x.id===id)||{}):{start_date:presetDate||''};
  const curSchool=e.school_id?((DB.schools.find(s=>s.id===e.school_id)||{}).name||''):'';
  const schoolOpts=(DB.schools||[]).map(s=>`<option value="${(s.name||'').replace(/"/g,'&quot;')}">`).join('');
  // 기존에 쓰인 커스텀 태그(구분)들도 목록에 모음
  const usedTags=[...new Set((DB.school_events||[]).map(x=>x.type).filter(t=>!EVENT_TYPE[t]))];
  const baseTags=Object.keys(EVENT_TYPE); // EXAM,VACATION,SEMESTER_START,EVENT
  openModal('학사일정 추가',`
    <div class="field"><label>학교 · 목록에서 고르거나 직접 입력</label>
      <input id="ev_school" list="ev_school_list" value="${curSchool.replace(/"/g,'&quot;')}" placeholder="전체 공통이면 비워두세요" autocomplete="off">
      <datalist id="ev_school_list">${schoolOpts}</datalist></div>
    <div class="field"><label>구분(태그)</label>
      <select id="ev_type" onchange="document.getElementById('ev_type_custom').style.display=this.value==='__custom__'?'block':'none'">
        ${baseTags.map(k=>`<option value="${k}" ${k===e.type?'selected':''}>${EVENT_TYPE[k]}</option>`).join('')}
        ${usedTags.map(t=>`<option value="${t}" ${t===e.type?'selected':''}>${t}</option>`).join('')}
        <option value="__custom__">+ 새 태그 직접 입력…</option>
      </select>
      <input id="ev_type_custom" placeholder="새 태그 이름 (예: 소풍, 학부모총회)" style="display:none;margin-top:6px;width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;">
    </div>

      } else {

async function searchStudentAcct(){
  const q=document.getElementById('stuSearch').value.trim();
  const box=document.getElementById('stuResults');
  if(!q){box.innerHTML='<div class="muted">이름을 입력하세요.</div>';return;}
  if(!LIVE){box.innerHTML='<div class="muted">샘플 모드에서는 동작하지 않습니다.</div>';return;}
  const r=await sb.rpc('admin_search_students',{p_name:q});
  if(r.error){box.innerHTML='<div class="muted">검색 오류: '+r.error.message+'</div>';return;}
  if(!r.data||!r.data.length){box.innerHTML='<div class="muted">일치하는 학생이 없습니다.</div>';return;}
  box.innerHTML=r.data.map(s=>{
    const enrCount=DB.enrollments.filter(e=>e.student_id===s.id).length;
    return `<div style="border:1px solid var(--line);border-radius:9px;padding:12px;margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div>
          <b style="font-size:15px;">${s.name}</b> <span class="muted">${s.grade!=null?gradeText(s.grade):''}</span>
          <div class="cmeta" style="font-size:12.5px;">아이디: ${s.login_id||'-'} · 연락처: ${s.parent_phone||'-'} · 수강 ${enrCount}건</div>
        </div>
      </div>
      <div class="row-actions" style="margin-top:8px;">
        <button class="btn sm" onclick="editStudentAcct(${s.id},'${(s.name||'').replace(/'/g,'')}',${s.grade},'${(s.parent_phone||'').replace(/'/g,'')}')">정보 수정</button>

  alert(`초기화 완료.\n'${nm2}' 학생의 임시 비밀번호: 0000\n로그인 후 변경하도록 안내해 주세요.`);

// 종료일 지난 활성 학기 자동 감지 → 백업 안내 + 비활성화
async function checkExpiredSemester(){
  if(!LIVE)return;
  const today=new Date(); today.setHours(0,0,0,0);
  const expired=(DB.semesters||[]).filter(s=>s.is_active && s.end_date && new Date(s.end_date)<today);
  for(const s of expired){
    const ok=confirm(`'${s.name}' 학기의 종료일(${s.end_date})이 지났습니다.\n\n지금 전체 데이터를 백업하고 이 학기를 비활성화할까요?\n(확인을 누르면 시트 백업이 실행됩니다)`);
    if(ok){
      try{ await backupToSheet(); }catch(e){}
      await sb.from('semesters').update({is_active:false}).eq('id',s.id);
      await loadAll();
      alert(`'${s.name}' 학기가 비활성화되었습니다.\n새 학기를 만들어 활성화해 주세요.`);
    }
  }
}

    <button class="btn primary" id="saveBtn">저장</button></div>`;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('saveBtn').onclick=onSave;
}

// 저장: Supabase 연결 시 DB에, 아니면 메모리(샘플)에
async function save(table,id,obj){
  if(LIVE){
    if(table==='courses'){
      // 강좌 본체 저장
      let payload={...obj}; delete payload.sessions; delete payload.instructor_id;
      // 새 강좌면 현재 활성 학기(또는 첫 학기)에 자동 소속
      if(!id && !payload.semester_id){
        const sem=(DB.semesters||[]).find(s=>s.is_active)||(DB.semesters||[])[0];
        if(!sem){alert('등록된 학기가 없습니다.\nSupabase의 semesters 테이블에 학기를 먼저 추가해 주세요.');return;}
        payload.semester_id=sem.id;
      }
      let res = id
        ? await sb.from('courses').update(payload).eq('id',id).select()
        : await sb.from('courses').insert(payload).select();
      if(res.error){alert('저장 오류: '+res.error.message);return;}
      const courseId = res.data[0].id;
      // 세션 저장 (수정 시 기존 것 지우고 다시 넣음)
      if(obj.sessions){
        await sb.from('course_sessions').delete().eq('course_id',courseId);
        const rows=obj.sessions.map(s=>({course_id:courseId,room_id:s.room_id,
          weekday:s.weekday,start_time:s.start_time,end_time:s.end_time,
          duration_min:durMin(s.start_time,s.end_time)}));
        const r2=await sb.from('course_sessions').insert(rows);
        if(r2.error)alert('세션 저장 오류: '+r2.error.message);
      }
      // 강사 연결 저장
      if(obj.instructor_id){
        await sb.from('course_instructors').delete().eq('course_id',courseId);
        const r3=await sb.from('course_instructors').insert({course_id:courseId,instructor_id:obj.instructor_id,is_primary:true});
        if(r3.error)alert('강사 연결 오류: '+r3.error.message);
      }
    } else {
      let payload={...obj};
      let res = id
        ? await sb.from(table).update(payload).eq('id',id).select()
        : await sb.from(table).insert(payload).select();
      if(res.error){alert('저장 오류: '+res.error.message);return;}
    }
    await loadAll();
  } else {
    if(id){Object.assign(DB[table].find(x=>x.id===id),obj);}
    else{const nid=Math.max(0,...DB[table].map(x=>x.id))+1;DB[table].push({id:nid,...obj});}
  }
}
async function del(table,id){
  // 강좌 삭제 시엔 연결된 신청·세션·강사연결을 먼저 정리
  if(table==='courses'){
    const enrCount=DB.enrollments.filter(e=>e.course_id===id).length;
    const msg=enrCount>0
      ? `이 강좌에 수강신청 ${enrCount}건이 있습니다.\n강좌와 신청내역을 모두 삭제할까요?`
      : '이 강좌를 삭제할까요?';
    if(!confirm(msg))return;
    if(LIVE){
      await sb.from('enrollments').delete().eq('course_id',id);
      await sb.from('course_sessions').delete().eq('course_id',id);
      await sb.from('course_instructors').delete().eq('course_id',id);
      const{error}=await sb.from('courses').delete().eq('id',id);
      if(error){alert('삭제 오류: '+error.message);return;}
      await loadAll();
    } else {
      DB.enrollments=DB.enrollments.filter(e=>e.course_id!==id);
      DB.courses=DB.courses.filter(x=>x.id!==id);
    }
    render(); return;
  }
  if(!confirm('정말 삭제할까요?'))return;
  if(LIVE){const{error}=await sb.from(table).delete().eq('id',id);if(error){alert(error.message);return;}await loadAll();}
  else{DB[table]=DB[table].filter(x=>x.id!==id);}
  render();
}

// ════════ Supabase 데이터 로드 ════════
async function loadAll(){
  if(!LIVE)return;
  const t=['semesters','subjects','instructors','rooms','target_groups','courses','enrollments','schools','school_events','notices','app_settings'];
  for(const tb of t){
    try{
      const{data,error}=await sb.from(tb).select('*');
      if(!error&&data)DB[tb]=data;
    }catch(err){ console.warn('테이블 로드 건너뜀:',tb,err); }
  }
  // 학생: RLS로 직접 읽기가 막혀 있으므로 관리자용 RPC로 조회 (연락처 포함)
  try{
    const r=await sb.rpc('admin_students');
    if(!r.error&&r.data)DB.students=r.data;
    else { // RPC 없거나 실패 시 폴백(구버전 호환)
      const d=await sb.from('students').select('*');
      if(!d.error&&d.data)DB.students=d.data;
    }
  }catch(err){ console.warn('학생 로드 건너뜀:',err); }
  // 강좌의 세션·강사 연결 로드
  try{
    const cs=await sb.from('course_sessions').select('*');
    const ci=await sb.from('course_instructors').select('*');
    if(cs.data&&ci.data){
      DB.courses.forEach(c=>{
        c.sessions=cs.data.filter(s=>s.course_id===c.id);
        const link=ci.data.find(x=>x.course_id===c.id);
        c.instructor_id=link?link.instructor_id:null;
      });
    }
  }catch(err){ console.warn('세션 로드 건너뜀:',err); }
}

function exportExcel(kind){

  let rows=[], fname='';

    rows=DB.courses.map(c=>({
      과목:name('subjects',c.subject_id), 강좌명:c.title, 강사:name('instructors',c.instructor_id),
      대상:name('target_groups',c.target_id),
      '요일·시간':(c.sessions||[]).map(s=>`${WD[s.weekday]} ${hhmm(s.start_time)}~${hhmm(s.end_time)}`).join(' / '),
      장소:(c.sessions||[])[0]?name('rooms',c.sessions[0].room_id):'',
      정원:c.capacity??'', 수강료:c.tuition||''
    }));
  } else if(kind==='students'){
    fname='학생목록';
    rows=DB.students.map(s=>({
      이름:s.name, 학년:s.grade??'', 학부모연락처:s.parent_phone||'',
      수강강좌:DB.enrollments.filter(e=>e.student_id===s.id).map(e=>(DB.courses.find(c=>c.id===e.course_id)||{}).title).filter(Boolean).join(', ')
    }));
  } else if(kind==='enrollments'){
    fname='수강신청내역';
    rows=DB.enrollments.map(e=>({
      학생:(DB.students.find(s=>s.id===e.student_id)||{}).name||'',
      강좌:(DB.courses.find(c=>c.id===e.course_id)||{}).title||'',
      상태:e.status==='WAITLIST'?'대기':e.status==='ENROLLED'?'등록':e.status,
      결제:e.payment_status==='PAID'?'완납':e.payment_status==='REFUNDED'?'환불':'미납'
    }));
  }
  if(!rows.length){alert('내보낼 데이터가 없습니다.');return;}
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,fname);
  const today=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`플래닛아카데미_${fname}_${today}.xlsx`);
}

// 저장 전용: 분 단위 정밀 시간표 (좌표 기반, 겹치면 좌우 분할)
function buildCleanTimetable(days){
  days=days||[1,2,3,4,5,6,7];
  const flat=conflicts().filter(f=> ttFilter==null ? true : f.course.instructor_id===ttFilter);
  const toMin=t=>{const[h,m]=(t||'0:0').split(':');return +h*60+ +m;};

  // 세션을 요일별로 모으기 (중복 세션 제거)
  const seen=new Set();
  const byDay={1:[],2:[],3:[],4:[],5:[],6:[],7:[]};
  flat.forEach(f=>{
    const key=f.course.id+'-'+f.weekday+'-'+f.start_time;
    if(seen.has(key))return; seen.add(key);
    byDay[f.weekday].push({
      cid:f.course.id, title:f.course.title, subj:f.course.subject_id,
      inst:f.course.instructor_id, room:f.room_id, target:f.course.target_id,
      start:toMin(f.start_time), end:toMin(f.end_time),
      st:hhmm(f.start_time), et:hhmm(f.end_time)
    });
  });

  // 표시 시간 범위 (지정된 요일들의 세션만 기준, 30분 단위 정렬)
  const shown=days.reduce((acc,d)=>acc.concat(byDay[d]),[]);
  const all=[].concat(...Object.values(byDay));
  const minTime=shown.length?Math.floor(Math.min(...shown.map(s=>s.start))/60)*60:9*60;
  const maxTime=shown.length?Math.ceil(Math.max(...shown.map(s=>s.end))/60)*60:22*60;

  // 과목별 색상
  const palette=[
    ['#e8f0fe','#1a56b0'],['#e6f4ea','#1e7e45'],['#fce8e6','#b3261e'],
    ['#fef7e0','#8a6d1a'],['#f3e8fd','#6b28b0'],['#e0f7fa','#00695c'],
    ['#fce4ec','#a01050'],['#e8eaf6','#3a48a0'],['#f1f8e9','#558b2f'],
    ['#fff3e0','#a1560a'],['#e0f2f1','#00796b'],['#ede7f6','#512da8']
  ];
  const subjColor={}; let ci=0;
  [...new Set(DB.courses.map(c=>c.subject_id))].forEach(sid=>{subjColor[sid]=palette[ci++%palette.length];});

  // 겹침 계산 → 각 세션에 열(col)과 총 열수(cols) 배정
  function layout(list){
    list.sort((a,b)=>a.start-b.start||a.end-b.end);
    // 겹치는 그룹(클러스터)으로 나눔
    const clusters=[]; let cur=[]; let curEnd=-1;
    list.forEach(s=>{
      if(cur.length && s.start>=curEnd){ clusters.push(cur); cur=[]; curEnd=-1; }
      cur.push(s); curEnd=Math.max(curEnd,s.end);
    });
    if(cur.length)clusters.push(cur);
    clusters.forEach(cl=>{
      const colEnds=[]; // 각 열의 마지막 end
      cl.forEach(s=>{
        let placed=false;
        for(let k=0;k<colEnds.length;k++){
          if(s.start>=colEnds[k]){ s.col=k; colEnds[k]=s.end; placed=true; break; }
        }
        if(!placed){ s.col=colEnds.length; colEnds.push(s.end); }
      });
      const totalCols=colEnds.length;
      cl.forEach(s=>s.cols=totalCols);
    });
  }
  Object.values(byDay).forEach(layout);

  const WDN=['','월','화','수','목','금','토','일'];
  const who = ttFilter==null ? '전체 강사' : ((DB.instructors.find(i=>i.id===ttFilter)||{}).name||'')+' 강사';
  const today=new Date();
  const dateStr=`${today.getFullYear()}. ${today.getMonth()+1}. ${today.getDate()}`;
  const dayLabel=days.length===7?'':` (${WDN[days[0]]}~${WDN[days[days.length-1]]})`;

  // ── A3 세로 고정 비율 레이아웃 ──
  // A3 세로 297×420mm (1:1.414). 폭을 고정하고 요일 칸을 균등 분할.
  const PAGE_W=1240;               // 전체 이미지 폭(px) — A3 세로 기준
  const PAD=34;                    // 바깥 여백
  const HEADER=70;                 // 상단 제목 영역
  const HEADH=38;                  // 요일 헤더 높이
  const TIMEW=54;                  // 시간축 폭
  const innerW=PAGE_W-PAD*2;       // 내용 폭
  const colW=(innerW-TIMEW)/days.length;   // 요일 칸 폭(균등)
  const dayW={}; days.forEach(d=>dayW[d]=colW);
  // 그리드 높이를 A3 세로 비율에 맞춰 결정 (전체 높이 ≈ 폭×1.414)
  const gridPX=Math.round(PAGE_W*1.414)-PAD*2-HEADER-HEADH-60; // 하단 범례 여유
  const PXPERMIN=(maxTime>minTime)? gridPX/(maxTime-minTime) : 1;
  const gridH=gridPX;

  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;left:-9999px;top:0;width:'+PAGE_W+'px;background:#fff;padding:'+PAD+'px;box-sizing:border-box;font-family:'
    +"'Pretendard','Apple SD Gothic Neo',sans-serif;";

  let html=`<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:6px;">
      <div style="font-size:26px;font-weight:800;color:#1a1a2e;letter-spacing:-.5px;">플래닛 아카데미 <span style="color:#3a7;">주간 시간표</span><span style="font-size:16px;color:#889;font-weight:600;">${dayLabel}</span></div>
      <div style="text-align:right;font-size:13px;color:#889;">${who}<br>${dateStr} 기준</div>
    </div>
    <div style="height:3px;background:linear-gradient(90deg,#3a7,#7bd);border-radius:2px;margin-bottom:16px;"></div>`;

  // 컨테이너
  html+=`<div style="position:relative;width:${innerW}px;">`;

  // 요일 헤더
  html+=`<div style="display:flex;height:${HEADH}px;">`;
  html+=`<div style="width:${TIMEW}px;background:#2e3a4d;border:1px solid #2e3a4d;"></div>`;
  days.forEach(d=>{
    const weekend=d>=6;
    html+=`<div style="width:${dayW[d]}px;background:${weekend?'#3d4a5d':'#2e3a4d'};color:${weekend?'#ffd9a0':'#fff'};
      display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;border:1px solid #2e3a4d;box-sizing:border-box;">${WDN[d]}</div>`;
  });
  html+=`</div>`;

  // 본체 (시간 눈금 + 요일 컬럼)
  html+=`<div style="display:flex;position:relative;">`;
  // 시간 눈금 열
  html+=`<div style="width:${TIMEW}px;position:relative;height:${gridH}px;background:#f4f6f9;border:1px solid #dde3ea;box-sizing:border-box;">`;
  for(let t=minTime;t<=maxTime;t+=30){
    const top=(t-minTime)*PXPERMIN;
    const isHour=(t%60===0);
    html+=`<div style="position:absolute;top:${top}px;left:0;right:0;height:0;border-top:1px solid ${isHour?'#c4ccd6':'#e4e9ef'};"></div>`;
    if(isHour)html+=`<div style="position:absolute;top:${top+2}px;left:0;right:3px;text-align:right;font-size:11px;color:#667;font-weight:600;">${String(t/60).padStart(2,'0')}:00</div>`;
  }
  html+=`</div>`;

  // 요일별 컬럼
  days.forEach(d=>{
    const CW=dayW[d];
    html+=`<div style="width:${CW}px;position:relative;height:${gridH}px;border:1px solid #dde3ea;border-left:none;box-sizing:border-box;background:#fdfdfe;">`;
    // 시간 눈금선
    for(let t=minTime;t<=maxTime;t+=30){
      const top=(t-minTime)*PXPERMIN;
      const isHour=(t%60===0);
      html+=`<div style="position:absolute;top:${top}px;left:0;right:0;height:0;border-top:1px solid ${isHour?'#e4e9ef':'#f0f3f7'};"></div>`;
    }
    // 강좌 블록
    byDay[d].forEach(s=>{
      const top=(s.start-minTime)*PXPERMIN;
      const height=(s.end-s.start)*PXPERMIN;
      const cols=s.cols||1, col=s.col||0;
      const gap=3;
      const w=(CW-gap*(cols+1))/cols;
      const left=gap+col*(w+gap);
      const col2=subjColor[s.subj]||['#eee','#333'];
      const narrow=w<95;                       // 겹쳐서 칸이 좁을 때
      const compact=height<40 || narrow;        // 상세 생략 조건
      const titleFS=narrow?9:(compact?10:11.5);
      const metaFS=narrow?8:9.5;
      html+=`<div style="position:absolute;top:${top+1}px;left:${left}px;width:${w}px;height:${height-2}px;
        background:${col2[0]};border:1px solid ${col2[1]}55;border-left:3px solid ${col2[1]};border-radius:4px;
        padding:${compact?'2px 4px':'4px 6px'};box-sizing:border-box;overflow:hidden;">
        <div style="font-weight:700;font-size:${titleFS}px;color:${col2[1]};line-height:1.15;">${escapeHtml(s.title)}</div>
        ${compact?(narrow?`<div style="font-size:${metaFS}px;color:#556;line-height:1.2;">${s.st}</div>`:''):`<div style="font-size:${metaFS}px;color:#556;line-height:1.35;margin-top:1px;">${s.st}~${s.et}<br>${name('instructors',s.inst)} · ${name('rooms',s.room)}</div>`}
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`</div></div>`; // 본체 + 컨테이너 닫기

  // 범례
  const usedSubj=[...new Set(all.map(s=>s.subj))];
  if(usedSubj.length){
    html+='<div style="margin-top:16px;display:flex;flex-wrap:wrap;gap:10px 18px;font-size:12px;color:#556;">';
    usedSubj.forEach(sid=>{
      const col=subjColor[sid]||['#eee','#333'];
      html+=`<span style="display:inline-flex;align-items:center;gap:6px;"><i style="width:14px;height:14px;border-radius:3px;background:${col[0]};border:1px solid ${col[1]};display:inline-block;"></i>${name('subjects',sid)}</span>`;
    });
    html+='</div>';
  }
  html+='<div style="margin-top:12px;text-align:right;font-size:11px;color:#aab;">flanetacademy.com</div>';

  wrap.innerHTML=html;
  return wrap;
}

// ════════ 어드민 로그인 + 권한 ════════
let currentAdmin=null; // {id,name,role,instructor_id}
async function hashPw(pw){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pw+'_flanet'));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
function isAdmin(){return currentAdmin && currentAdmin.role==='SUPER_ADMIN';}
function isTeacher(){return currentAdmin && currentAdmin.role==='TEACHER';}

function renderLoginGate(){
  document.querySelector('.layout').style.display='none';
  // 모바일 상단 헤더 숨김 (로그인 화면에선 불필요)
  const mh=document.getElementById('mobileHeader'); if(mh)mh.style.display='none';
  // 이전 강사 로그인으로 숨겨졌던 메뉴 원복
  document.querySelectorAll('.navbtn').forEach(b=>b.style.display='');
  let g=document.getElementById('loginGate');
  if(!g){g=document.createElement('div');g.id='loginGate';document.body.appendChild(g);}
  g.style.cssText='position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--paper);z-index:100;padding:20px;';
  g.innerHTML=`
    <div style="width:100%;max-width:360px;">
      <div style="text-align:center;margin-bottom:22px;">
        <div style="font-size:20px;font-weight:700;">플래닛 아카데미</div>
        <div style="font-size:13px;color:var(--ink-soft);margin-top:3px;">관리자 · 강사 로그인</div>
      </div>
      <div class="card">
        <div class="field"><label>아이디</label><input id="ad_id" placeholder="아이디" autocomplete="username"></div>
        <div class="field"><label>비밀번호</label><input id="ad_pw" type="password" placeholder="비밀번호" autocomplete="current-password" onkeydown="if(event.key==='Enter')adminLogin()"></div>
        <button class="btn primary" style="width:100%;" onclick="adminLogin()">로그인</button>
        ${LIVE?'':'<p class="muted" style="font-size:12px;text-align:center;margin-top:10px;color:var(--ink-soft);">샘플 모드: 아무 값이나 입력하면 관리자로 들어갑니다.</p>'}
      </div>
    </div>`;
}
async function adminLogin(){
  const lid=document.getElementById('ad_id').value.trim();
  const pw=document.getElementById('ad_pw').value;
  if(!lid||!pw){alert('아이디와 비밀번호를 입력해 주세요.');return;}
  if(LIVE){
    const ph=await hashPw(pw);
    const res=await sb.from('admin_users').select('*, admin_roles(code)').eq('login_id',lid).eq('password_hash',ph);
    if(!res.data||!res.data.length){alert('아이디 또는 비밀번호가 올바르지 않습니다.');return;}
    const u=res.data[0];
    currentAdmin={id:u.id,name:u.name,role:u.admin_roles?u.admin_roles.code:'TEACHER',instructor_id:u.instructor_id};
  } else {
    currentAdmin={id:1,name:'관리자(샘플)',role:'SUPER_ADMIN',instructor_id:null};
  }
  // 이 브라우저에 로그인 유지 (탭 닫으면 자동 해제)
  try{ sessionStorage.setItem('flanet_admin', JSON.stringify(currentAdmin)); }catch(e){}
  startApp();
}
function adminLogout(){
  currentAdmin=null; ttFilter=null;
  try{ sessionStorage.removeItem('flanet_admin'); }catch(e){}
  closeDrawer();
  // 리로드 없이 즉시 로그인 화면으로 (데이터 재로딩 안 함)
  renderLoginGate();
}
function startApp(){
  const g=document.getElementById('loginGate'); if(g)g.remove();
  document.querySelector('.layout').style.display='flex';
  // 모바일 헤더 원복 (CSS media query가 표시 여부 결정)
  const mh=document.getElementById('mobileHeader'); if(mh)mh.style.display='';
  // 메뉴 표시 초기화 후 역할별 적용
  document.querySelectorAll('.navbtn').forEach(b=>b.style.display='');
  // 강사면 본인 강의로 시간표 필터 고정 + 메뉴 제한
  if(isTeacher()){
    ttFilter=currentAdmin.instructor_id;
    document.querySelectorAll('.navbtn').forEach(b=>{
      if(['students','enrollments','notices','master','accounts'].includes(b.dataset.view)) b.style.display='none';
      if(b.id==='backupBtn') b.style.display='none';
    });
  }
  // 연결 상태 표시에 로그인 정보 추가
  const txt=document.getElementById('connTxt');
  if(txt) txt.textContent=(currentAdmin.name)+' · '+(isAdmin()?'관리자':'강사');
  view='dashboard';
  // 첫 화면 active 표시 동기화
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active',b.dataset.view===view));
  render();
  // 관리자 로그인 시 종료된 학기 자동 감지 (백업+비활성화 안내)
  if(isAdmin()) setTimeout(()=>checkExpiredSemester(),800);
}

// ════════ 시작 ════════
(async function init(){
  const dot=document.getElementById('connDot'),txt=document.getElementById('connTxt');
  if(LIVE){
    try{await loadAll();dot.classList.add('on');txt.textContent='Supabase 연결됨';}
    catch(e){LIVE=false;txt.textContent='연결 실패 · 샘플';}
  }
  // 저장된 로그인 복원 (이 브라우저에서 이미 로그인했으면 유지)
  let saved=null;
  try{ saved=JSON.parse(sessionStorage.getItem('flanet_admin')||'null'); }catch(e){}
  if(saved){ currentAdmin=saved; startApp(); }
  else { renderLoginGate(); } // 로그인 먼저
})();
</script>
